<div class="min-h-screen bg-gradient-to-br from-purple-50 to-blue-50 px-4 py-8">
  <div class="max-w-2xl mx-auto">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Configure sua conta</h1>
      <p class="text-gray-600 mt-2">Responda algumas perguntas para personalizar sua experiência</p>
    </div>

    <!-- Stepper -->
    <div class="flex items-center justify-center mb-12">
      <div class="flex items-center">
        <div class="flex items-center">
          <div [class]="currentStep() >= 1 ? 'w-10 h-10 rounded-full bg-purple-600 text-white flex items-center justify-center font-semibold' : 'w-10 h-10 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center font-semibold'">
            1
          </div>
          <div class="w-16 h-1 mx-2" [class]="currentStep() > 1 ? 'bg-purple-600' : 'bg-gray-300'"></div>
        </div>
        <div class="flex items-center">
          <div [class]="currentStep() >= 2 ? 'w-10 h-10 rounded-full bg-purple-600 text-white flex items-center justify-center font-semibold' : 'w-10 h-10 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center font-semibold'">
            2
          </div>
          <div class="w-16 h-1 mx-2" [class]="currentStep() > 2 ? 'bg-purple-600' : 'bg-gray-300'"></div>
        </div>
        <div [class]="currentStep() >= 3 ? 'w-10 h-10 rounded-full bg-purple-600 text-white flex items-center justify-center font-semibold' : 'w-10 h-10 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center font-semibold'">
          3
        </div>
      </div>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <!-- Step 1: Tipo -->
      <div *ngIf="currentStep() === 1">
        <h2 class="text-2xl font-bold text-gray-900 mb-2">Tipo de negócio</h2>
        <p class="text-gray-600 mb-6">Como você trabalha?</p>
        
        <div class="space-y-3">
          <button
            *ngFor="let type of businessTypes"
            type="button"
            (click)="selectBusinessType(type.value)"
            [class]="businessType() === type.value 
              ? 'w-full p-5 border-2 border-purple-600 bg-purple-50 rounded-xl text-left transition hover:bg-purple-100' 
              : 'w-full p-5 border-2 border-gray-200 rounded-xl text-left transition hover:border-purple-300 hover:bg-gray-50'"
          >
            <div class="flex items-center">
              <span class="text-3xl mr-4">{{ type.icon }}</span>
              <span class="text-lg font-semibold text-gray-900">{{ type.label }}</span>
            </div>
          </button>
        </div>
      </div>

      <!-- Step 2: Produtos -->
      <div *ngIf="currentStep() === 2">
        <h2 class="text-2xl font-bold text-gray-900 mb-2">O que você vende?</h2>
        <p class="text-gray-600 mb-6">Selecione uma ou mais opções</p>
        
        <div class="space-y-3">
          <button
            *ngFor="let product of products"
            type="button"
            (click)="toggleProduct(product.value)"
            [class]="selectedProducts().includes(product.value)
              ? 'w-full p-5 border-2 border-purple-600 bg-purple-50 rounded-xl text-left transition hover:bg-purple-100'
              : 'w-full p-5 border-2 border-gray-200 rounded-xl text-left transition hover:border-purple-300 hover:bg-gray-50'"
          >
            <div class="flex items-center justify-between">
              <span class="text-lg font-semibold text-gray-900">{{ product.label }}</span>
              <div *ngIf="selectedProducts().includes(product.value)" class="w-6 h-6 bg-purple-600 rounded-full flex items-center justify-center">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                </svg>
              </div>
            </div>
          </button>
        </div>
      </div>

      <!-- Step 3: Objetivo -->
      <div *ngIf="currentStep() === 3">
        <h2 class="text-2xl font-bold text-gray-900 mb-2">Seu objetivo principal</h2>
        <p class="text-gray-600 mb-6">O que você quer alcançar com o Vendara?</p>
        
        <div class="space-y-3">
          <button
            *ngFor="let obj of objectives"
            type="button"
            (click)="selectObjective(obj.value)"
            [class]="objective() === obj.value
              ? 'w-full p-5 border-2 border-purple-600 bg-purple-50 rounded-xl text-left transition hover:bg-purple-100'
              : 'w-full p-5 border-2 border-gray-200 rounded-xl text-left transition hover:border-purple-300 hover:bg-gray-50'"
          >
            <div class="flex items-center">
              <span class="text-3xl mr-4">{{ obj.icon }}</span>
              <span class="text-lg font-semibold text-gray-900">{{ obj.label }}</span>
            </div>
          </button>
        </div>
      </div>

      <!-- Navigation -->
      <div class="flex items-center justify-between mt-8 pt-6 border-t border-gray-200">
        <button
          *ngIf="currentStep() > 1"
          type="button"
          (click)="prevStep()"
          [disabled]="loading()"
          class="px-6 py-2 text-gray-700 font-semibold hover:text-gray-900 transition disabled:opacity-50"
        >
          ← Voltar
        </button>
        <div *ngIf="currentStep() === 1"></div>

        <button
          *ngIf="currentStep() < 3"
          type="button"
          (click)="nextStep()"
          [disabled]="!canProceed() || loading()"
          class="px-6 py-3 bg-purple-600 text-white font-semibold rounded-lg hover:bg-purple-700 disabled:opacity-50 disabled:cursor-not-allowed transition"
        >
          Próximo →
        </button>

        <button
          *ngIf="currentStep() === 3"
          type="button"
          (click)="complete()"
          [disabled]="!canProceed() || loading()"
          class="px-6 py-3 bg-purple-600 text-white font-semibold rounded-lg hover:bg-purple-700 disabled:opacity-50 disabled:cursor-not-allowed transition flex items-center"
        >
          <span *ngIf="!loading()">Finalizar</span>
          <span *ngIf="loading()" class="flex items-center">
            <svg class="animate-spin h-5 w-5 mr-2" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Criando ambiente...
          </span>
        </button>
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage()" class="mt-4 p-4 bg-red-50 border border-red-200 rounded-lg">
        <p class="text-red-800 text-sm">{{ errorMessage() }}</p>
      </div>
    </div>
  </div>
</div>
