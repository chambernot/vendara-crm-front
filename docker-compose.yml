version: '3.8'

services:
  vendara:
    build: .
    container_name: vendara-app
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - vendara-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  vendara-network:
    driver: bridge
