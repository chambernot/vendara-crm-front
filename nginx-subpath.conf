# Configuração Nginx para servir Angular em subpath
# Para usar em https://hcasistemas.com.br/joiasia/

server {
    listen 80;
    server_name hcasistemas.com.br;
    
    # Root do servidor (pode ter outras aplicações)
    root /var/www/html;
    
    # Servir aplicação Angular do subpath /joiasia/
    location /joiasia/ {
        alias /var/www/html/joiasia/;
        try_files $uri $uri/ /joiasia/index.html;
        
        # Importante: garantir que o index.html seja servido corretamente
        index index.html;
    }
    
    # Cache agressivo para assets com hash
    location ~* /joiasia/.*\.(js|css)$ {
        alias /var/www/html/joiasia/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Cache para imagens e fontes
    location ~* /joiasia/.*\.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        alias /var/www/html/joiasia/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Sem cache para index.html
    location = /joiasia/index.html {
        alias /var/www/html/joiasia/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    # Headers de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Compressão gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_comp_level 6;
    
    # MIME types corretos
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
}
